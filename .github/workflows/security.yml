# V-022 FIX: Security scanning pipeline
# Runs on PRs and pushes to develop/main
#
# chore/github-actions-ci (2026-05-10): el job "typecheck" se movio a
# .github/workflows/ci.yml (que ademas corre prisma generate antes de tsc
# y usa --skipLibCheck, asi que es mas confiable). Este workflow queda
# enfocado solo en security scans (audit de deps + deteccion de secrets).
name: Security Scan

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: npx audit-ci --high

  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
