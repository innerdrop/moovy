    /* ─────────────────────────────────────────────────────────────────
       Asignación de IDs estables — cada item recibe un ID basado en
       (stage, substage, indice) que NO cambia entre vistas.
       ───────────────────────────────────────────────────────────────── */
    const FLAT_ITEMS = [];
    let ITEM_COUNT = 0;
    STAGES.forEach(stage => {
        stage.substages.forEach(sub => {
            sub.items.forEach((item, ii) => {
                item.id = `s${stage.id}-${sub.id}-${ii.toString().padStart(2, '0')}`;
                item.stageId = stage.id;
                item.stageTitle = stage.title;
                item.stageIcon = stage.icon;
                item.substageId = sub.id;
                item.substageTitle = sub.title;
                FLAT_ITEMS.push(item);
                ITEM_COUNT++;
            });
        });
    });

    /* ─────────────────────────────────────────────────────────────────
       State management + persistencia
       ───────────────────────────────────────────────────────────────── */
    const STORAGE_KEY = 'moovy-prelaunch-checklist-v2'; // v2 — cambio de IDs
    const THEME_KEY = 'moovy-prelaunch-theme';
    const VIEW_KEY = 'moovy-prelaunch-view';
    const ACTIVE_STAGE_KEY = 'moovy-prelaunch-active-stage';
    const EXPANDED_SUBS_KEY = 'moovy-prelaunch-expanded-subs';

    function testLocalStorage() {
        try {
            const k = '__moovy_test__';
            localStorage.setItem(k, '1');
            const works = localStorage.getItem(k) === '1';
            localStorage.removeItem(k);
            return works;
        } catch { return false; }
    }
    const LS_AVAILABLE = testLocalStorage();
    let lastSavedAt = null;

    function loadState() {
        if (!LS_AVAILABLE) return {};
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return {};
            const parsed = JSON.parse(raw);
            if (parsed.savedAt) lastSavedAt = new Date(parsed.savedAt).getTime();
            return parsed.items || {};
        } catch { return {}; }
    }

    function saveState() {
        if (!LS_AVAILABLE) return;
        try {
            const payload = { items: state, savedAt: new Date().toISOString() };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
            lastSavedAt = Date.now();
            updateAutoSaveIndicator();
        } catch {}
    }

    let state = loadState();
    let currentStatusFilter = 'all';
    let currentCriticalityFilter = 'all';
    let currentSearch = '';
    let currentView = (LS_AVAILABLE && localStorage.getItem(VIEW_KEY)) || 'stage';
    let activeStageId = parseInt((LS_AVAILABLE && localStorage.getItem(ACTIVE_STAGE_KEY)) || '1');
    let expandedSubs = JSON.parse((LS_AVAILABLE && localStorage.getItem(EXPANDED_SUBS_KEY)) || '{}');

    function getItemState(id) {
        return state[id] || { state: null, obs: '', updatedAt: null };
    }
    function setItemState(id, patch) {
        const existing = state[id] || { state: null, obs: '', updatedAt: null };
        state[id] = { ...existing, ...patch, updatedAt: new Date().toISOString() };
        saveState();
        render();
    }

    /* ─────────────────────────────────────────────────────────────────
       Filtros + stats
       ───────────────────────────────────────────────────────────────── */
    function matchesFilters(item) {
        const s = getItemState(item.id).state;
        if (currentStatusFilter !== 'all') {
            if (currentStatusFilter === 'pending' && s !== null) return false;
            if (currentStatusFilter !== 'pending' && s !== currentStatusFilter) return false;
        }
        if (currentCriticalityFilter === 'critical' && item.c !== 1) return false;
        if (currentCriticalityFilter === 'optional' && item.c !== 0) return false;
        if (currentSearch) {
            const q = currentSearch.toLowerCase();
            if (!item.t.toLowerCase().includes(q)) return false;
        }
        return true;
    }

    function computeStats(items) {
        const stats = { total: items.length, pass: 0, fail: 0, partial: 0, blocked: 0, pending: 0, done: 0 };
        items.forEach(it => {
            const s = getItemState(it.id).state;
            if (s === 'pass') { stats.pass++; stats.done++; }
            else if (s === 'fail') { stats.fail++; stats.done++; }
            else if (s === 'partial') { stats.partial++; stats.done++; }
            else if (s === 'blocked') { stats.blocked++; stats.done++; }
            else stats.pending++;
        });
        return stats;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    /* ─────────────────────────────────────────────────────────────────
       Render — global progress
       ───────────────────────────────────────────────────────────────── */
    function renderGlobalProgress() {
        const stats = computeStats(FLAT_ITEMS);
        const pct = stats.total > 0 ? Math.round((stats.done / stats.total) * 100) : 0;
        document.getElementById('global-done').textContent = stats.done;
        document.getElementById('global-total').textContent = stats.total;
        document.getElementById('global-pct').textContent = pct;
        document.getElementById('global-bar').style.width = pct + '%';
        document.getElementById('global-breakdown').innerHTML = `
            <span class="breakdown-chip"><span class="breakdown-dot" style="background:#22c55e"></span>${stats.pass}</span>
            <span class="breakdown-chip"><span class="breakdown-dot" style="background:#ef4444"></span>${stats.fail}</span>
            <span class="breakdown-chip"><span class="breakdown-dot" style="background:#f59e0b"></span>${stats.partial}</span>
            <span class="breakdown-chip"><span class="breakdown-dot" style="background:#6b7280"></span>${stats.blocked}</span>
            <span class="breakdown-chip"><span class="breakdown-dot" style="background:rgba(255,255,255,0.4)"></span>${stats.pending}</span>
        `;
    }

    /* ─────────────────────────────────────────────────────────────────
       Render — stage tabs
       ───────────────────────────────────────────────────────────────── */
    function renderStageNav() {
        const nav = document.getElementById('stage-nav');
        nav.innerHTML = '';
        STAGES.forEach(stage => {
            const stageItems = FLAT_ITEMS.filter(i => i.stageId === stage.id);
            const stats = computeStats(stageItems);
            const btn = document.createElement('button');
            btn.className = 'stage-tab' + (stage.id === activeStageId ? ' active' : '');
            btn.innerHTML = `
                <div class="stage-tab-num">Etapa ${stage.id}</div>
                <div class="stage-tab-title">${stage.icon} ${stage.title}</div>
                <div class="stage-tab-progress">${stats.done}/${stats.total}</div>
            `;
            btn.onclick = () => {
                activeStageId = stage.id;
                if (LS_AVAILABLE) localStorage.setItem(ACTIVE_STAGE_KEY, String(stage.id));
                render();
                document.querySelector('.app-header').scrollIntoView({ behavior: 'smooth' });
            };
            nav.appendChild(btn);
        });
    }

    /* ─────────────────────────────────────────────────────────────────
       Render — stage hero (objective + expected state + side stats)
       ───────────────────────────────────────────────────────────────── */
    function renderStageHero() {
        const wrap = document.getElementById('stage-hero-wrap');
        if (currentView !== 'stage') { wrap.innerHTML = ''; return; }
        const stage = STAGES.find(s => s.id === activeStageId);
        const stageItems = FLAT_ITEMS.filter(i => i.stageId === stage.id);
        const stats = computeStats(stageItems);
        const pct = stats.total > 0 ? Math.round((stats.done / stats.total) * 100) : 0;
        const prev = STAGES.find(s => s.id === stage.id - 1);
        const next = STAGES.find(s => s.id === stage.id + 1);

        wrap.innerHTML = `
            <div class="stage-hero">
                <div class="stage-hero-main">
                    <h1>
                        <span class="stage-num-badge">Etapa ${stage.id} / ${STAGES.length}</span>
                        <span>${stage.icon} ${escapeHtml(stage.title)}</span>
                        <span class="stage-time-badge">⏱️ ${stage.time}</span>
                    </h1>
                    <div class="stage-cards">
                        <div class="stage-card objective">
                            <div class="stage-card-label">🎯 Objetivo</div>
                            <div class="stage-card-text">${escapeHtml(stage.objective)}</div>
                        </div>
                        <div class="stage-card expected">
                            <div class="stage-card-label">📋 Estado esperado al terminar</div>
                            <div class="stage-card-text">${escapeHtml(stage.expectedState)}</div>
                        </div>
                    </div>
                </div>
                <div class="stage-side">
                    <div class="stage-side-progress-text">Progreso de la etapa: <strong>${stats.done}/${stats.total} · ${pct}%</strong></div>
                    <div class="stage-side-progress-bar"><div class="stage-side-progress-fill" style="width:${pct}%"></div></div>
                    <div class="stage-side-stats">
                        <div><span class="dot" style="background:#22c55e"></span>${stats.pass} pasan</div>
                        <div><span class="dot" style="background:#ef4444"></span>${stats.fail} fallan</div>
                        <div><span class="dot" style="background:#f59e0b"></span>${stats.partial} parciales</div>
                        <div><span class="dot" style="background:#6b7280"></span>${stats.blocked} bloqueados</div>
                    </div>
                    <div class="stage-nav-buttons">
                        <button class="stage-nav-btn" ${!prev ? 'disabled' : ''} onclick="window.__gotoStage(${prev?.id})">← Etapa ${prev?.id || '—'}</button>
                        <button class="stage-nav-btn" ${!next ? 'disabled' : ''} onclick="window.__gotoStage(${next?.id})">Etapa ${next?.id || '—'} →</button>
                    </div>
                </div>
            </div>
        `;
    }
    window.__gotoStage = function(id) {
        if (!id) return;
        activeStageId = id;
        if (LS_AVAILABLE) localStorage.setItem(ACTIVE_STAGE_KEY, String(id));
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    /* ─────────────────────────────────────────────────────────────────
       Render — items (re-used in both views)
       ───────────────────────────────────────────────────────────────── */
    function renderItem(item) {
        const itemState = getItemState(item.id);
        const stateClass = itemState.state ? `state-${itemState.state}` : '';
        const expanded = (itemState.obs && itemState.obs.length > 0) ? 'expanded' : '';
        const itemEl = document.createElement('div');
        itemEl.className = `item ${stateClass} ${expanded}`;
        itemEl.dataset.id = item.id;

        const critHtml = item.c === 1
            ? `<span class="crit-badge" title="🔴 Bloqueante para launch">🔴</span>`
            : `<span class="crit-badge" title="🟡 No bloquea launch">🟡</span>`;

        itemEl.innerHTML = `
            <div class="item-header">
                ${critHtml}
                <div class="item-text">${escapeHtml(item.t)}</div>
            </div>
            <div class="item-details">
                <div class="detail-block how">
                    <div class="detail-label">Cómo probarlo</div>
                    <div class="detail-text">${escapeHtml(item.how)}</div>
                </div>
                <div class="detail-block expect">
                    <div class="detail-label">Qué deberías ver</div>
                    <div class="detail-text">${escapeHtml(item.expect)}</div>
                </div>
            </div>
            <div class="item-actions">
                <button class="state-btn pass ${itemState.state === 'pass' ? 'active' : ''}" data-state="pass">✅ Pasa</button>
                <button class="state-btn fail ${itemState.state === 'fail' ? 'active' : ''}" data-state="fail">❌ Falla</button>
                <button class="state-btn partial ${itemState.state === 'partial' ? 'active' : ''}" data-state="partial">⚠️ Parcial</button>
                <button class="state-btn blocked ${itemState.state === 'blocked' ? 'active' : ''}" data-state="blocked">🚫 Bloqueado</button>
            </div>
            <textarea class="item-obs" placeholder="Observación, qué falla, cómo reproducir, contexto...">${escapeHtml(itemState.obs || '')}</textarea>
            <div class="item-meta">
                <button class="obs-toggle">${expanded ? 'Cerrar observación' : '+ Agregar observación'}</button>
                <span>${itemState.updatedAt ? `Actualizado: ${new Date(itemState.updatedAt).toLocaleString('es-AR')}` : ''}</span>
            </div>
        `;
        itemEl.querySelectorAll('.state-btn').forEach(btn => {
            btn.onclick = () => {
                const newState = btn.dataset.state;
                const cur = getItemState(item.id).state;
                setItemState(item.id, { state: cur === newState ? null : newState });
            };
        });
        const textarea = itemEl.querySelector('.item-obs');
        textarea.oninput = e => {
            const existing = state[item.id] || { state: null, obs: '', updatedAt: null };
            state[item.id] = { ...existing, obs: e.target.value, updatedAt: new Date().toISOString() };
            saveState();
        };
        textarea.onblur = () => render();
        itemEl.querySelector('.obs-toggle').onclick = e => {
            e.preventDefault();
            itemEl.classList.toggle('expanded');
            if (itemEl.classList.contains('expanded')) textarea.focus();
        };
        return itemEl;
    }

    /* ─────────────────────────────────────────────────────────────────
       Render — main (STAGE view: 1 etapa a la vez con sub-acordeones)
       ───────────────────────────────────────────────────────────────── */
    function renderMainByStage() {
        const main = document.getElementById('main');
        main.innerHTML = '';
        const stage = STAGES.find(s => s.id === activeStageId);
        let visible = 0;

        stage.substages.forEach(sub => {
            const visibleItems = sub.items.filter(matchesFilters);
            if (visibleItems.length === 0) return;
            const stats = computeStats(sub.items);
            const pct = stats.total > 0 ? Math.round((stats.done / stats.total) * 100) : 0;
            const subKey = `${stage.id}-${sub.id}`;
            const isExpanded = expandedSubs[subKey] !== false; // default expanded

            const subEl = document.createElement('div');
            subEl.className = `substage ${isExpanded ? 'expanded' : ''}`;
            subEl.innerHTML = `
                <div class="substage-header">
                    <span class="substage-chevron">▶</span>
                    <span class="substage-id">${sub.id}</span>
                    <span class="substage-title">${escapeHtml(sub.title)}</span>
                    <div class="substage-progress">
                        <span>${stats.done}/${stats.total}</span>
                        <div class="substage-progress-bar"><div class="substage-progress-fill" style="width:${pct}%"></div></div>
                    </div>
                </div>
                <div class="substage-body"></div>
            `;
            const body = subEl.querySelector('.substage-body');
            visibleItems.forEach(it => body.appendChild(renderItem(it)));
            subEl.querySelector('.substage-header').onclick = () => {
                expandedSubs[subKey] = !subEl.classList.contains('expanded');
                if (LS_AVAILABLE) localStorage.setItem(EXPANDED_SUBS_KEY, JSON.stringify(expandedSubs));
                render();
            };
            main.appendChild(subEl);
            visible += visibleItems.length;
        });

        if (visible === 0) {
            main.innerHTML = `<div class="empty-state"><div class="empty-state-emoji">🔍</div><div class="empty-state-text">No hay tests que coincidan con los filtros en esta etapa</div></div>`;
        }
    }

    /* ─────────────────────────────────────────────────────────────────
       Render — main (LIST view: por viaje/sub-etapa lineal, todas
       las etapas a la vez)
       ───────────────────────────────────────────────────────────────── */
    function renderMainByList() {
        const main = document.getElementById('main');
        main.innerHTML = '';
        let visible = 0;
        STAGES.forEach(stage => {
            const stageItems = stage.substages.flatMap(s => s.items);
            const visibleStage = stageItems.filter(matchesFilters);
            if (visibleStage.length === 0) return;
            const stageStats = computeStats(stageItems);
            const stageEl = document.createElement('div');
            stageEl.className = 'list-view-section';
            stageEl.innerHTML = `
                <div class="list-view-section-header">
                    <span class="stage-num-badge">E${stage.id}</span>
                    <span>${stage.icon} ${escapeHtml(stage.title)}</span>
                    <span style="font-size:13px;color:var(--text-muted);font-weight:600">${stageStats.done}/${stageStats.total}</span>
                </div>
            `;
            stage.substages.forEach(sub => {
                const visibleItems = sub.items.filter(matchesFilters);
                if (visibleItems.length === 0) return;
                const subEl = document.createElement('div');
                subEl.className = 'list-view-subsection';
                subEl.innerHTML = `<div class="list-view-subsection-title"><span class="substage-id">${sub.id}</span> ${escapeHtml(sub.title)}</div>`;
                visibleItems.forEach(it => subEl.appendChild(renderItem(it)));
                stageEl.appendChild(subEl);
                visible += visibleItems.length;
            });
            main.appendChild(stageEl);
        });
        if (visible === 0) {
            main.innerHTML = `<div class="empty-state"><div class="empty-state-emoji">🔍</div><div class="empty-state-text">No hay tests que coincidan con los filtros</div></div>`;
        }
    }

    function render() {
        renderGlobalProgress();
        renderStageNav();
        renderStageHero();
        const navWrap = document.getElementById('stage-nav-wrap');
        if (currentView === 'stage') {
            navWrap.style.display = '';
            renderMainByStage();
        } else {
            navWrap.style.display = 'none';
            renderMainByList();
        }
    }

    /* View toggle */
    document.getElementById('view-stage-btn').onclick = () => {
        currentView = 'stage';
        if (LS_AVAILABLE) localStorage.setItem(VIEW_KEY, currentView);
        document.getElementById('view-stage-btn').classList.add('active');
        document.getElementById('view-list-btn').classList.remove('active');
        render();
    };
    document.getElementById('view-list-btn').onclick = () => {
        currentView = 'list';
        if (LS_AVAILABLE) localStorage.setItem(VIEW_KEY, currentView);
        document.getElementById('view-list-btn').classList.add('active');
        document.getElementById('view-stage-btn').classList.remove('active');
        render();
    };
    if (currentView === 'list') {
        document.getElementById('view-list-btn').classList.add('active');
        document.getElementById('view-stage-btn').classList.remove('active');
    }

    /* Filtros */
    document.getElementById('search').oninput = e => { currentSearch = e.target.value; render(); };
    document.getElementById('filter-status').onchange = e => { currentStatusFilter = e.target.value; render(); };
    document.getElementById('filter-criticality').onchange = e => { currentCriticalityFilter = e.target.value; render(); };

    /* Theme */
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        if (LS_AVAILABLE) localStorage.setItem(THEME_KEY, theme);
        document.getElementById('fab-theme').textContent = theme === 'dark' ? '☀️' : '🌙';
    }
    const savedTheme = (LS_AVAILABLE && localStorage.getItem(THEME_KEY)) || 'light';
    applyTheme(savedTheme);
    document.getElementById('fab-theme').onclick = () => {
        const cur = document.documentElement.getAttribute('data-theme') || 'light';
        applyTheme(cur === 'light' ? 'dark' : 'light');
    };

    /* Toast */
    function toast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast show' + (isError ? ' error' : '');
        setTimeout(() => { t.className = 'toast'; }, 3000);
    }

    /* Save / Load progreso (JSON) */
    document.getElementById('fab-save').onclick = () => {
        const data = { app: 'moovy-prelaunch-checklist', schema: 'v2', savedAt: new Date().toISOString(), items: state, view: currentView, activeStageId };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const ts = new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-');
        a.href = url; a.download = `moovy-checklist-state-${ts}.json`;
        a.click();
        URL.revokeObjectURL(url);
        toast('💾 Progreso descargado');
    };
    document.getElementById('fab-load').onclick = () => document.getElementById('file-input').click();
    document.getElementById('file-input').onchange = e => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const parsed = JSON.parse(ev.target.result);
                if (parsed.app !== 'moovy-prelaunch-checklist' || typeof parsed.items !== 'object') throw new Error('inv');
                if (Object.keys(state).length > 0 && !confirm('Ya tenés progreso guardado. ¿Reemplazarlo con el del archivo?')) return;
                state = parsed.items;
                saveState();
                if (parsed.activeStageId) activeStageId = parsed.activeStageId;
                if (parsed.view) { currentView = parsed.view; if (LS_AVAILABLE) localStorage.setItem(VIEW_KEY, currentView); }
                render();
                toast('📂 Progreso cargado');
            } catch (err) { toast('Archivo inválido o corrupto', true); }
        };
        reader.readAsText(file);
        e.target.value = '';
    };

    /* Export MD para Claude */
    document.getElementById('fab-export').onclick = () => {
        const stats = computeStats(FLAT_ITEMS);
        const pct = stats.total > 0 ? Math.round((stats.done / stats.total) * 100) : 0;
        const lines = [];
        lines.push(`# Moovy · Pre-Launch QA Checklist — Export`);
        lines.push(``);
        lines.push(`**Generado**: ${new Date().toLocaleString('es-AR')}`);
        lines.push(`**Progreso global**: ${stats.done}/${stats.total} (${pct}%)`);
        lines.push(``);
        lines.push(`- ✅ Pasan: **${stats.pass}**`);
        lines.push(`- ❌ Fallan: **${stats.fail}**`);
        lines.push(`- ⚠️ Parciales: **${stats.partial}**`);
        lines.push(`- 🚫 Bloqueados: **${stats.blocked}**`);
        lines.push(`- ⬜ Pendientes: **${stats.pending}**`);
        STAGES.forEach(stage => {
            const stageItems = FLAT_ITEMS.filter(i => i.stageId === stage.id);
            const stageStats = computeStats(stageItems);
            const stagePct = stageStats.total > 0 ? Math.round((stageStats.done / stageStats.total) * 100) : 0;
            lines.push(``);
            lines.push(`---`);
            lines.push(``);
            lines.push(`## Etapa ${stage.id}: ${stage.icon} ${stage.title} — ${stageStats.done}/${stageStats.total} (${stagePct}%)`);
            lines.push(``);
            lines.push(`> **🎯 Objetivo**: ${stage.objective}`);
            lines.push(`> **📋 Estado esperado al terminar**: ${stage.expectedState}`);
            lines.push(``);
            stage.substages.forEach(sub => {
                lines.push(`### ${sub.id} · ${sub.title}`);
                lines.push(``);
                sub.items.forEach(item => {
                    const itemState = getItemState(item.id);
                    const symbol = itemState.state ? ({ pass: '✅', fail: '❌', partial: '⚠️', blocked: '🚫' })[itemState.state] : '⬜';
                    const crit = item.c === 1 ? '🔴' : '🟡';
                    lines.push(`- [${symbol}] ${crit} **${item.t}**`);
                    if (itemState.obs) lines.push(`  - **Obs**: ${itemState.obs.replace(/\n/g, ' ')}`);
                });
                lines.push(``);
            });
        });
        const blob = new Blob([lines.join('\n')], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const ts = new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-');
        a.href = url; a.download = `moovy-checklist-export-${ts}.md`;
        a.click();
        URL.revokeObjectURL(url);
        toast('📥 MD descargado');
    };

    /* Auto-save indicator */
    function updateAutoSaveIndicator() {
        const pill = document.getElementById('auto-save-pill');
        const text = document.getElementById('auto-save-text');
        if (!LS_AVAILABLE) {
            pill.classList.add('warning');
            text.textContent = 'Guardado automático no disponible — usá 💾 manualmente';
            return;
        }
        if (!lastSavedAt) { text.textContent = 'Guardado automático activo'; return; }
        const ago = Math.round((Date.now() - lastSavedAt) / 1000);
        if (ago < 60) text.textContent = `Guardado hace ${ago}s`;
        else if (ago < 3600) text.textContent = `Guardado hace ${Math.round(ago / 60)} min`;
        else text.textContent = `Guardado hace ${Math.round(ago / 3600)} h`;
    }
    setInterval(updateAutoSaveIndicator, 10000);

    /* INIT */
    render();
    updateAutoSaveIndicator();
    document.getElementById('header-subtitle').textContent = `${STAGES.length} etapas · ${ITEM_COUNT} tests · datos acumulativos`;
    </script>
</body>
</html>
